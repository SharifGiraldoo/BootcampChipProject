# Tiny Tapeout project information
# Bootcamp Diseño y Fabricación de Chips — IEEE OpenSilicon / IEEE CASS UTP 2026
# Shuttle: SKY26a  |  PDK: sky130A  |  Deadline envío: Abril 22, 2026

project:
  title:       "ALU 7 bits - Entrada Serial / Salida Paralela"
  author:      "Bootcamp Diseño y Fabricación de Chips UTP 2026"
  discord:     ""
  description: >
    ALU de 7 bits con entrada serial LSB-first y salida paralela de 8 bits.
    Soporta Suma, AND, OR, XOR y Resta. Protocolo: 7 bits op_A + 7 bits op_B
    + 3 bits opcode por flanco de CLK (17 ciclos en total). Señal Done en
    uio[0] indica fin de operación.
  language:    "Verilog"
  clock_hz:    50000000   # 50 MHz — máximo garantizado por TinyTapeout IO

  # Un tile mínimo (160 x 100 um) es suficiente para esta ALU
  tiles: "1x1"

  # El nombre del módulo top DEBE comenzar con "tt_um_"
  top_module: "tt_um_alu7b"

  # ÚNICO archivo fuente — evita redeclaración de módulos en Yosys
  source_files:
    - "tt_um_alu7b.v"

# Mapa de pines — completar todos los campos (no eliminar ni agregar pines)
pinout:

  # ── Entradas dedicadas ────────────────────────────────────────────────────
  ui[0]: "Bit_in — Dato serial de entrada (LSB primero: 7b A, 7b B, 3b op)"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # ── Salidas dedicadas ─────────────────────────────────────────────────────
  uo[0]: "Data_out[0] — Resultado bit 0 (LSB)"
  uo[1]: "Data_out[1] — Resultado bit 1"
  uo[2]: "Data_out[2] — Resultado bit 2"
  uo[3]: "Data_out[3] — Resultado bit 3"
  uo[4]: "Data_out[4] — Resultado bit 4"
  uo[5]: "Data_out[5] — Resultado bit 5"
  uo[6]: "Data_out[6] — Resultado bit 6 (MSB del operando)"
  uo[7]: "Data_out[7] — Carry (suma) / Borrow (resta)"

  # ── Pines bidireccionales ─────────────────────────────────────────────────
  uio[0]: "Done — Pulso alto (1 ciclo CLK) cuando la operación ha finalizado"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# No modificar
yaml_version: 6
