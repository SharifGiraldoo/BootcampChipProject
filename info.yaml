# Tiny Tapeout project information
# Bootcamp IC Design & Fabrication — IEEE OpenSilicon / IEEE CASS UTP 2026
# Shuttle: SKY26a  |  PDK: sky130A  |  Submission deadline: April 22, 2026

project:
  title:       "7-bit ALU - Serial Input / Parallel Output"
  author:      "Sharif Obando"
  discord:     "sharif_g230"
  description: >
    7-bit ALU with LSB-first serial input and 8-bit parallel output.
    Supports ADD, AND, OR, XOR and SUB. Protocol: 7 bits op_A + 7 bits op_B
    + 3 bits opcode per CLK edge (17 cycles total). Done signal on uio[0]
    indicates end of operation.
  language:    "Verilog"
  clock_hz:    50000000   # 50 MHz — TinyTapeout IO maximum

  # One minimum tile (160 x 100 um) is sufficient for this ALU
  tiles: "1x1"

  # Top module name MUST start with "tt_um_"
  top_module: "tt_um_serial_alu_ctrl"

  # Source files — also update PROJECT_SOURCES in test/Makefile
  source_files:
    - "alu_7b.v"
    - "tt_um_serial_alu_ctrl.v"
    - "tt_um_alu7b.v"

# Pin map — all fields must be present (do not add or remove pins)
pinout:

  #Dedicated inputs
  ui[0]: "Bit_in — Serial data input (LSB first: 7b A, 7b B, 3b opcode)"
  ui[1]: "op0 — Opcode bit 0 (LSB of opcode)"
  ui[2]: "op1"
  ui[3]: "op2"
  ui[4]: "op3"
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  #Dedicated outputs
  uo[0]: "Data_out[0] — Result bit 0 (LSB)"
  uo[1]: "Data_out[1] — Result bit 1"
  uo[2]: "Data_out[2] — Result bit 2"
  uo[3]: "Data_out[3] — Result bit 3"
  uo[4]: "Data_out[4] — Result bit 4"
  uo[5]: "Data_out[5] — Result bit 5"
  uo[6]: "Data_out[6] — Result bit 6 (MSB of operand)"
  uo[7]: "Data_out[7] — Carry (ADD) / Borrow (SUB)"

  #Bidirectional pins
  uio[0]: "Done — One-cycle high pulse (1 CLK) when the operation has finished"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not modify
yaml_version: 6